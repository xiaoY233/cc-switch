name: Remote Helper Artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: helper-artifacts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-helper:
    name: Build Helper (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            helper_os: Linux
            helper_arch: x86_64
            helper_path: src-tauri/target/release/cc-switch-remote-helper
          - os: ubuntu-22.04-arm
            helper_os: Linux
            helper_arch: arm64
            helper_path: src-tauri/target/release/cc-switch-remote-helper
          - os: macos-14
            helper_os: macOS
            helper_arch: universal
            helper_path: src-tauri/target/universal-apple-darwin/release/cc-switch-remote-helper

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS universal targets
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev

      - name: Cache Cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: helper-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: helper-${{ runner.os }}-${{ runner.arch }}-

      - name: Build remote helper CLI
        shell: bash
        run: |
          set -euxo pipefail
          if [ "${{ runner.os }}" = "macOS" ]; then
            cargo build --manifest-path src-tauri/Cargo.toml --release --no-default-features --target aarch64-apple-darwin --bin cc-switch-remote-helper
            cargo build --manifest-path src-tauri/Cargo.toml --release --no-default-features --target x86_64-apple-darwin --bin cc-switch-remote-helper
            mkdir -p src-tauri/target/universal-apple-darwin/release
            lipo -create \
              -output src-tauri/target/universal-apple-darwin/release/cc-switch-remote-helper \
              src-tauri/target/aarch64-apple-darwin/release/cc-switch-remote-helper \
              src-tauri/target/x86_64-apple-darwin/release/cc-switch-remote-helper
            chmod +x src-tauri/target/universal-apple-darwin/release/cc-switch-remote-helper
          else
            cargo build --manifest-path src-tauri/Cargo.toml --release --no-default-features --bin cc-switch-remote-helper
          fi

      - name: Prepare helper artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p helper-artifacts
          short_sha="${GITHUB_SHA::8}"
          asset="cc-switch-remote-helper-${short_sha}-${{ matrix.helper_os }}-${{ matrix.helper_arch }}"
          cp "${{ matrix.helper_path }}" "helper-artifacts/${asset}"
          chmod +x "helper-artifacts/${asset}"
          ls -la helper-artifacts

      - name: Upload helper artifact
        uses: actions/upload-artifact@v7
        with:
          name: cc-switch-remote-helper-${{ matrix.helper_os }}-${{ matrix.helper_arch }}
          path: helper-artifacts/*
          if-no-files-found: error

  publish-helper-release:
    name: Publish Helper Release
    runs-on: ubuntu-22.04
    needs: build-helper
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download helper artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: cc-switch-remote-helper-*
          path: helper-release
          merge-multiple: true

      - name: Publish remote-helper-latest release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: remote-helper-latest
        run: |
          set -euxo pipefail
          ls -la helper-release
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$TAG" --force
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "CC Switch Remote Helper Latest" \
              --notes "Latest pure CLI remote helper binaries for cc-switch-remote."
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "CC Switch Remote Helper Latest" \
              --notes "Latest pure CLI remote helper binaries for cc-switch-remote." \
              --prerelease
          fi
          gh release view "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --json assets \
            --jq '.assets[].name' |
            grep -E '^(cc-switch-remote-helper|cc-switch-cli)-' |
            while read -r asset; do
              gh release delete-asset "$TAG" "$asset" --repo "$GITHUB_REPOSITORY" -y
            done
          gh release upload "$TAG" helper-release/* --clobber --repo "$GITHUB_REPOSITORY"
